<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" role="img" aria-labelledby="title desc">
  <title id="title">DailyWealth4You logo</title>
  <desc id="desc">A gold globe behind rising blue bars with a sweeping dark blue arrow.</desc>
  <defs>
    <linearGradient id="globeStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54C"/>
      <stop offset="45%" stop-color="#FFB400"/>
      <stop offset="100%" stop-color="#F08A24"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#31C9EE"/>
      <stop offset="38%" stop-color="#2A9ED7"/>
      <stop offset="100%" stop-color="#1B4C90"/>
    </linearGradient>
    <linearGradient id="barShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E79C0" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#0E2956" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrowFill" x1="10%" y1="80%" x2="100%" y2="10%">
      <stop offset="0%" stop-color="#193861"/>
      <stop offset="45%" stop-color="#1D4F8C"/>
      <stop offset="78%" stop-color="#225FA9"/>
      <stop offset="100%" stop-color="#27B8F0"/>
    </linearGradient>
    <linearGradient id="tailFill" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F2243"/>
      <stop offset="100%" stop-color="#2A5F9A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#E5EEFF" stop-opacity="0"/>
      <stop offset="22%" stop-color="#C9D9F8" stop-opacity=".55"/>
      <stop offset="62%" stop-color="#E1EEFF" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#D9E6FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B1732" flood-opacity=".18"/>
    </filter>
  </defs>

  <g transform="translate(0 6)">
    <g fill="none" stroke="url(#globeStroke)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)" opacity=".96">
      <circle cx="438" cy="260" r="148"/>
      <path d="M290 260h296"/>
      <path d="M438 112c-50 40-80 95-80 148s30 108 80 148"/>
      <path d="M438 112c50 40 80 95 80 148s-30 108-80 148"/>
      <path d="M324 178c50 30 129 43 228 38"/>
      <path d="M326 344c61-26 139-38 223-35"/>
      <path d="M560 154c18 30 28 66 28 106 0 40-10 76-28 108"/>
    </g>

    <g filter="url(#softShadow)">
      <rect x="132" y="392" width="34" height="54" rx="17" fill="url(#barFill)"/>
      <rect x="172" y="332" width="48" height="114" rx="20" fill="url(#barFill)"/>
      <rect x="252" y="250" width="66" height="196" rx="25" fill="url(#barFill)"/>
      <rect x="336" y="166" width="76" height="280" rx="29" fill="url(#barFill)"/>
      <rect x="434" y="94" width="86" height="352" rx="33" fill="url(#barFill)"/>
      <path d="M132 392h34v54h-34zM172 332h48v114h-48zM252 250h66v196h-66zM336 166h76v280h-76zM434 94h86v352h-86z" fill="url(#barShadow)" opacity=".35"/>
    </g>

    <path d="M54 524c22-32 58-66 111-95-35 29-58 61-76 104-9 20-20 32-37 39 10-13 16-28 20-48 0 0-8 8-18 14z" fill="url(#tailFill)"/>
    <path d="M76 502c78-73 184-121 300-143 97-18 206-66 306-180" fill="none" stroke="url(#arrowFill)" stroke-width="88" stroke-linecap="round" stroke-linejoin="round" filter="url(#softShadow)"/>
    <path d="M632 126l134-102 22 173-88-49z" fill="url(#arrowFill)" filter="url(#softShadow)"/>
    <path d="M112 474c88-63 182-104 284-124 98-19 190-60 281-155" fill="none" stroke="url(#shine)" stroke-width="17" stroke-linecap="round" opacity=".92"/>
  </g>
</svg>
